# 5-node RaftKV cluster (tolerates 2 node failures) + Prometheus + Grafana.
#
#   docker compose -f deploy/docker-compose.5node.yml up --build
#
# Each node's HTTP client API is published on the host as 8080..8084; write to
# any node — a non-leader replies 307 to the leader (see -api-peers). Grafana is
# on http://localhost:3000 (anonymous, admin), Prometheus on http://localhost:9091.
name: raftkv5

x-node: &node
  build:
    context: ..
    dockerfile: Dockerfile
  restart: unless-stopped

x-peers: &peers "0@raft0:9090,1@raft1:9090,2@raft2:9090,3@raft3:9090,4@raft4:9090"
x-apipeers: &apipeers "0@http://raft0:8080,1@http://raft1:8080,2@http://raft2:8080,3@http://raft3:8080,4@http://raft4:8080"

services:
  raft0:
    <<: *node
    command: ["-id", "0", "-peers", *peers, "-api-peers", *apipeers, "-data-dir", "/data"]
    ports: ["8080:8080"]
    volumes: ["raft0-data:/data"]
  raft1:
    <<: *node
    command: ["-id", "1", "-peers", *peers, "-api-peers", *apipeers, "-data-dir", "/data"]
    ports: ["8081:8080"]
    volumes: ["raft1-data:/data"]
  raft2:
    <<: *node
    command: ["-id", "2", "-peers", *peers, "-api-peers", *apipeers, "-data-dir", "/data"]
    ports: ["8082:8080"]
    volumes: ["raft2-data:/data"]
  raft3:
    <<: *node
    command: ["-id", "3", "-peers", *peers, "-api-peers", *apipeers, "-data-dir", "/data"]
    ports: ["8083:8080"]
    volumes: ["raft3-data:/data"]
  raft4:
    <<: *node
    command: ["-id", "4", "-peers", *peers, "-api-peers", *apipeers, "-data-dir", "/data"]
    ports: ["8084:8080"]
    volumes: ["raft4-data:/data"]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9091:9090"]
    depends_on: [raft0, raft1, raft2, raft3, raft4]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  raft0-data: {}
  raft1-data: {}
  raft2-data: {}
  raft3-data: {}
  raft4-data: {}
