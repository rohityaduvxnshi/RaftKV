syntax = "proto3";

package raftpb;

option go_package = "github.com/rohityaduvxnshi/RaftKV/internal/transport/grpc/proto;raftpb";

// Raft is the inter-node RPC service. The three RPCs mirror Figure 2 exactly and
// carry the same fields as the in-memory transport's Go structs, so the Raft core
// is oblivious to which transport is in use.
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
  bool no_op = 4;
}

message RequestVoteRequest {
  uint64 term = 1;
  int32 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 conflict_term = 3;
  uint64 conflict_index = 4;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}
