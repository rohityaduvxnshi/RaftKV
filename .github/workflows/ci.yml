name: CI

on:
  push:
  pull_request:

# The whole project must build, vet clean, be gofmt-clean, and pass the race
# detector on every push. The -race run is the one that matters: a data race is
# a bug, not a warning, and no phase merges with a known race.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: gofmt (fail on unformatted files)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test -race
        run: go test -race ./...
